# Testcontainers configuration
# This helps with Docker connectivity and performance

# Enable container reuse for faster test execution
testcontainers.reuse.enable=true

# Docker socket configuration (MacOS)
# Testcontainers will auto-detect Docker Desktop on Mac

# Reduce startup timeout if Docker is slow
testcontainers.startup.timeout.seconds=120

# Log more information during container startup (helpful for debugging)
# Set to false in production CI/CD
checks.disable=false
